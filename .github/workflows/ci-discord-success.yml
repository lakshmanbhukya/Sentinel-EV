name: CI + Discord Success Notification

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app-demo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app-demo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  notify-discord:
    name: Notify Discord on Build Success
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.result == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret is not set. Skipping notification."
            exit 0
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"
          RUN_URL="$SERVER_URL/$REPOSITORY/actions/runs/$RUN_ID"

          PAYLOAD=$(cat <<EOF
          {
            "username": "Sentinel EV CI",
            "embeds": [
              {
                "title": "Build Succeeded",
                "description": "CI passed for Sentinel EV frontend.",
                "color": 5763719,
                "fields": [
                  { "name": "Repository", "value": "$REPOSITORY", "inline": true },
                  { "name": "Branch", "value": "$BRANCH", "inline": true },
                  { "name": "Commit", "value": "`$SHORT_SHA`", "inline": true },
                  { "name": "Actor", "value": "$ACTOR", "inline": true },
                  { "name": "Run", "value": "[Open workflow run]($RUN_URL)", "inline": false }
                ],
                "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              }
            ]
          }
          EOF
          )

          curl --fail --show-error --silent \
            -H "Content-Type: application/json" \
            -X POST \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"
        continue-on-error: true
